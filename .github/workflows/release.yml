name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive version from tag
        id: version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # The released version comes from the git tag. The committed manifests
      # keep a baseline version, so there is nothing to bump before tagging —
      # CI stamps the tag version into them so the built app, DMG and cask all
      # agree.
      - name: Stamp version from tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const j=JSON.parse(fs.readFileSync(p));j.version=process.env.VERSION;fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n')"
          perl -i -pe 's/^version = ".*"/version = "$ENV{VERSION}"/' src-tauri/Cargo.toml

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      # Tauri signs the .app with APPLE_SIGNING_IDENTITY (imported from the
      # base64 APPLE_CERTIFICATE into a temporary keychain because CI=true),
      # then notarizes and staples it with the APPLE_ID credentials before
      # producing the universal DMG.
      - name: Build, sign & notarize universal DMG
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bun run tauri build --target universal-apple-darwin --verbose

      - name: Locate DMG and compute checksum
        id: dmg
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          SRC="$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name '*.dmg' | head -1)"
          if [ -z "$SRC" ]; then
            echo "::error::No DMG produced by tauri build"
            exit 1
          fi
          DEST="Mnemo_${VERSION}_universal.dmg"
          cp "$SRC" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"
          echo "sha256=$(shasum -a 256 "$DEST" | cut -d ' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          DMG: ${{ steps.dmg.outputs.path }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$DMG" --clobber
          else
            gh release create "$TAG" --title "Mnemo $TAG" --generate-notes "$DMG"
          fi

      - name: Publish Homebrew cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.dmg.outputs.sha256 }}
        run: |
          set -euo pipefail
          TAP_DIR="$RUNNER_TEMP/homebrew-tap"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/illegalstudio/homebrew-tap.git" "$TAP_DIR"
          mkdir -p "$TAP_DIR/Casks"
          cat > "$TAP_DIR/Casks/mnemo.rb" <<EOF
          # This file is generated by Mnemo's release CI. DO NOT EDIT.
          cask "mnemo" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/illegalstudio/mnemo/releases/download/${TAG}/Mnemo_${VERSION}_universal.dmg",
                verified: "github.com/illegalstudio/mnemo/"
            name "Mnemo"
            desc "Personal archive for AI chat conversations"
            homepage "https://github.com/illegalstudio/mnemo"

            app "Mnemo.app"

            zap trash: [
              "~/Library/Application Support/studio.illegal.mnemo",
              "~/Library/Caches/studio.illegal.mnemo",
              "~/Library/HTTPStorages/studio.illegal.mnemo",
              "~/Library/Preferences/studio.illegal.mnemo.plist",
              "~/Library/Saved Application State/studio.illegal.mnemo.savedState",
              "~/Library/WebKit/studio.illegal.mnemo",
            ]
          end
          EOF
          cd "$TAP_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- Casks/mnemo.rb; then
            echo "Cask already up to date for ${VERSION}"
            exit 0
          fi
          git add Casks/mnemo.rb
          git commit -m "mnemo ${TAG}"
          git push
